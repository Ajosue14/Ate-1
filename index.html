<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
```css

<div class="panel">
  <h3>🔎 Buscar cliente / código</h3>
  <input type="text" id="buscador" placeholder="Código o nombre...">

  <h3>🏙 Distritos</h3>

<!-- PANEL DE FRECUENCIA -->
<div class="panel panel-frecuencia">
  <h3>📅 Frecuencia</h3>

  <label><input type="checkbox" value="L"> Lunes</label><br>
  <label><input type="checkbox" value="M"> Martes</label><br>
  <label><input type="checkbox" value="X"> Miércoles</label><br>
  <label><input type="checkbox" value="J"> Jueves</label><br>
  <label><input type="checkbox" value="V"> Viernes</label><br>
  <label><input type="checkbox" value="S"> Sábado</label><br>

  <button onclick="soloHoy()">📍 SOLO HOY</button>
</div>

<div id="map"></div>

<script>
const map = L.map('map').setView([-12.05, -77.03], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const capa = L.layerGroup().addTo(map);
const rutas = L.layerGroup().addTo(map);

let tiendas = [];
let visibles = [];
let colores = {};
let colorIndex = 0;
const palette = ['red','blue','green','orange','violet','gold','black','grey'];

function colorDistrito(d) {
  if (!colores[d]) colores[d] = palette[colorIndex++ % palette.length];
  return colores[d];
}

function icono(color) {
  return L.icon({
    iconUrl:`https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-${color}.png`,
    shadowUrl:'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
    iconSize:[25,41], iconAnchor:[12,41]
  });
}

function limpiarFreq(f){ return (f||'').replaceAll('/',''); }

Papa.parse("ATE 1.csv", {
  download:true,
  header:true,
  complete:(res)=>{
    tiendas = res.data
      .filter(t=>t.LATITUT && t.LONGITUTD)
      .map(t=>({
        codigo: t["Customer Account # / Cliente"],
        nombre: t["Customer Name/Solic"],
        distrito: t.City,
        direccion: t.Calle,
        freq: limpiarFreq(t.FRECUENCIA),
        lat:+t.LATITUT, lng:+t.LONGITUTD
      }));
    cargarDistritos();
    aplicarFiltros();
  }
});

function cargarDistritos(){
  const cont=document.getElementById("listaDistritos");
  [...new Set(tiendas.map(t=>t.distrito))].sort().forEach(d=>{
    cont.innerHTML+=`<label><input type="checkbox" checked value="${d}"> ${d}</label><br>`;
  });
  cont.querySelectorAll("input").forEach(i=>i.onchange=aplicarFiltros);
  document.querySelectorAll("input[type=checkbox]").forEach(i=>i.onchange=aplicarFiltros);
  document.getElementById("buscador").oninput=aplicarFiltros;
}

function aplicarFiltros(){
  const dist = [...document.querySelectorAll("#listaDistritos input:checked")].map(i=>i.value);
  const dias = [...document.querySelectorAll(".panel input[value=L],.panel input[value=M],.panel input[value=X],.panel input[value=J],.panel input[value=V],.panel input[value=S]")]
    .filter(i=>i.checked).map(i=>i.value);
  const texto = document.getElementById("buscador").value.toLowerCase();

  visibles = tiendas.filter(t =>
    dist.includes(t.distrito) &&
    (!dias.length || dias.some(d=>t.freq.includes(d))) &&
    (!texto || (t.codigo+t.nombre).toLowerCase().includes(texto))
  );

  pintar();
}

function pintar(){
  capa.clearLayers();
  rutas.clearLayers();
  const resumen = {};

  visibles.forEach(t=>{
    resumen[t.distrito]=(resumen[t.distrito]||0)+1;

    L.marker([t.lat,t.lng],{icon:icono(colorDistrito(t.distrito))})
      .bindPopup(`
        <b>${t.nombre}</b><br>
        <b>Código:</b> ${t.codigo}<br>
        <b>Distrito:</b> ${t.distrito}<br>
        <b>Frecuencia:</b> ${t.freq}<br>
        ${t.direccion}
      `)
      .addTo(capa);
  });

  document.getElementById("contador").innerText=`Tiendas visibles: ${visibles.length}`;

  let h="";
  for (const d in resumen) h+=`${d}: ${resumen[d]}<br>`;
  document.getElementById("resumen").innerHTML=h;
}

function soloHoy(){
  const dias=["D","L","M","X","J","V","S"];
  const hoy=dias[new Date().getDay()];
  document.querySelectorAll(".panel input[value]").forEach(i=>i.checked=i.value===hoy);
  aplicarFiltros();
}

function exportar(){
  let csv="Codigo,Nombre,Distrito,Frecuencia,Direccion\n";
  visibles.forEach(t=>{
    csv+=`"${t.codigo}","${t.nombre}","${t.distrito}","${t.freq}","${t.direccion}"\n`;
  });
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download="tiendas_filtradas.csv";
  a.click();
}
</script>

</body>
</html>
